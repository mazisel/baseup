version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* build sırasında bundle'a gömülür (bkz. Dockerfile)
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        - NEXT_PUBLIC_FROM_EMAIL=${NEXT_PUBLIC_FROM_EMAIL:-SupaOps <noreply@supaops.com>}
    ports:
      # Host portu doluysa (örn. Supabase Studio 3000 kullanır) WEB_PORT ile değiştirin
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEXT_PUBLIC_FROM_EMAIL=${NEXT_PUBLIC_FROM_EMAIL:-SupaOps <noreply@supaops.com>}
      - PAYTR_MERCHANT_ID=${PAYTR_MERCHANT_ID}
      - PAYTR_MERCHANT_KEY=${PAYTR_MERCHANT_KEY}
      - PAYTR_MERCHANT_SALT=${PAYTR_MERCHANT_SALT}
      - SAAS_RUNNER_MODE=${SAAS_RUNNER_MODE:-legacy}
      - LEGACY_WEBAPP_URL=${LEGACY_WEBAPP_URL:-http://legacy:4567}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
    depends_on:
      - redis
      - legacy
    restart: unless-stopped

  legacy:
    build:
      context: ./legacy
      dockerfile: Dockerfile
    # GÜVENLİK: Bu API auth içermez ve müşteri sunucularında root SSH
    # komutları çalıştırır. Port bilinçli olarak publish EDİLMİYOR —
    # yalnızca compose iç ağından (http://legacy:4567) erişilir.
    restart: unless-stopped

  redis:
    image: redis:alpine
    # Port bilinçli olarak publish edilmiyor — yalnızca iç ağdan erişilir.
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
