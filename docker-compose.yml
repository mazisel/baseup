version: '3.8'
services:
  web:
    # İmajlar GitHub Actions'ta build edilip GHCR'a pushlanır
    # (.github/workflows/build-images.yml). NEXT_PUBLIC_* değerleri
    # oradaki build sırasında gömülür — repo Variables'tan tanımlanır.
    image: ghcr.io/mazisel/baseup-web:latest
    network_mode: host
    environment:
      - NODE_ENV=production
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - NEXT_PUBLIC_FROM_EMAIL=${NEXT_PUBLIC_FROM_EMAIL:-SupaOps <noreply@supaops.com>}
      - PAYTR_MERCHANT_ID=${PAYTR_MERCHANT_ID}
      - PAYTR_MERCHANT_KEY=${PAYTR_MERCHANT_KEY}
      - PAYTR_MERCHANT_SALT=${PAYTR_MERCHANT_SALT}
      - SAAS_RUNNER_MODE=${SAAS_RUNNER_MODE:-legacy}
      - LEGACY_WEBAPP_URL=${LEGACY_WEBAPP_URL:-http://localhost:4567}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
    depends_on:
      - redis
    restart: unless-stopped

  legacy:
    image: ghcr.io/mazisel/baseup-legacy:latest
    # GÜVENLİK: Bu API auth içermez ve müşteri sunucularında root SSH
    # komutları çalıştırır. network_mode: host kullanılıyor çünkü
    # Docker bridge ağı dış sunuculara SSH bağlantısını engelleyebilir.
    # Port (4567) sunucuda doğrudan açılır — UFW ile dışarıdan erişimi kapatın.
    network_mode: host
    restart: unless-stopped

  redis:
    image: redis:alpine
    network_mode: host
    # Port bilinçli olarak publish edilmiyor — yalnızca iç ağdan erişilir.
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
