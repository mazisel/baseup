name: Build & push images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NEXT_PUBLIC_* değerleri build sırasında bundle'a gömülür.
      # Repo Settings → Secrets and variables → Actions → Variables
      # altında tanımlayın; değiştirince bu workflow'u yeniden çalıştırın.
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/baseup-web:latest
            ghcr.io/${{ github.repository_owner }}/baseup-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
            NEXT_PUBLIC_FROM_EMAIL=${{ vars.NEXT_PUBLIC_FROM_EMAIL || 'SupaOps <noreply@supaops.com>' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push legacy
        uses: docker/build-push-action@v6
        with:
          context: ./legacy
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/baseup-legacy:latest
            ghcr.io/${{ github.repository_owner }}/baseup-legacy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
